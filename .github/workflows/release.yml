name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: msi,nsis
            artifact: fuck-rvc-windows-x64
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact: fuck-rvc-macos-x64
          - platform: macos-15
            target: aarch64-apple-darwin
            bundles: dmg
            artifact: fuck-rvc-macos-arm64

    runs-on: ${{ matrix.platform }}
    env:
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: sidecar/requirements.txt

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Install Python sidecar deps (CPU torch)
        env:
          PYTHONUTF8: "1"
        run: |
          # fairseq==0.12.2 pins omegaconf<2.1; pip>=24.1 rejects its wheel metadata
          python -m pip install "pip<24.1"
          pip install -r sidecar/requirements.txt --extra-index-url https://download.pytorch.org/whl/cpu
        shell: bash

      - name: Download RVC vendor sources
        run: python -m scripts.setup_rvc --skip-weights
        working-directory: sidecar
        shell: bash

      - name: Build sidecar (PyInstaller)
        run: pnpm sidecar:build

      - name: Generate icons
        run: |
          pip install Pillow
          python scripts/generate_icons.py
        shell: bash

      - name: Build Tauri bundle
        run: pnpm tauri build --config src-tauri/tauri.bundle.conf.json --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.msi
            dist/**/*.exe
            dist/**/*.dmg
          generate_release_notes: true
          draft: true
